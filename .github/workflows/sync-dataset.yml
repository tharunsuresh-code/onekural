name: Sync dataset to Supabase

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/kurals.csv"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync kurals.csv → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/sync-dataset.ts

      - name: Export kurals → public/data/kurals.json
        run: npm run export-data

      - name: Commit updated kurals.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/kurals.json
          git diff --staged --quiet || git commit -m "chore: update public/data/kurals.json"
          git push
