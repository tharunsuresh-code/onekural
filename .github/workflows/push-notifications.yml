name: Send Push Notifications

on:
  schedule:
    # Runs every 30 minutes — replaces Vercel cron (free tier only allows daily)
    - cron: "*/30 * * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger push notification endpoint
        run: |
          curl -f -X GET "${{ secrets.APP_URL }}/api/push/send" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
